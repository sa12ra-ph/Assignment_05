<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitHub Issue Tracker-LogIn</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center h-screen">
  <div class="bg-white w-96 p-8 rounded-xl shadow-lg">
    <div class="flex flex-col items-center justify-center text-center mb-6"><img src="./assets/github-logo.png" alt="">
    </div>
    <h1 class="text-3xl font-bold text-center mb-2"> GitHub Issues Tracker</h1>
    <p class="text-center text-gray-500 mb-6">Sign in to manage your issues</p>
    <p></p>
    <input type="text" class="w-full p-3 mb-4 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400" placeholder="Enter Username">
    <p>Password</p>
    <input type="password" class="w-full p-3 mb-6 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400" placeholder="Enter Password">

    <button class="w-full bg-blue-700 text-white py-3 rounded-lg hover:bg-blue-800 transition">Sign In</button>
  </div>

</body>
</html>
